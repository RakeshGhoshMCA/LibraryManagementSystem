<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    
        <!-- Login Section -->
    <div id="login-container" class="form-section">
        <div class="form-box">
            <h2>Login</h2>
            <form>
                <input type="text" placeholder="Email or Phone" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            <p>Don't have an account? <a href="#signup-container">Sign Up</a></p>
        </div>
    </div>

    <hr>

    <!-- Sign Up Section -->
    <div id="signup-container" class="form-section">
        <div class="form-box">
            <h2>Student Sign Up</h2>
            <form>
                <div class="form-grid">
                    <input type="text" placeholder="Student ID" required>
                    <input type="text" placeholder="Full Name" required>
                    <input type="text" placeholder="Course/Major" required>
                    <input type="tel" placeholder="Phone Number" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Create Password" required>
                </div>
                <button type="submit" class="submit-btn signup-btn">Create Account</button>
            </form>
            <p>Already have an account? <a href="#login-container">Login</a></p>
        </div>
    </div>
</body>
</html>
